# DeepSeek V4 config for AutoResearchClaw.
# Two-model reviewer isolation: v4-flash writes, v4-pro critiques.
# Set your key first:  export DEEPSEEK_API_KEY="sk-..."
project:
  name: hwsec
  mode: "full-auto"

research:
  topic: >
    Hardware-performance-counter based runtime detection of Spectre/Meltdown
    and transient-execution side-channel attacks using lightweight change-point
    or anomaly detection on SPEC CPU-style workloads; focus on systems-security
    and microarchitecture papers, exclude generic machine-learning surveys and
    general scientific-computing papers
  domains:
    - systems security
    - microarchitecture
    - side-channel analysis
  quality_threshold: 6.0
  graceful_degradation: true

llm:
  provider: "openai-compatible"
  base_url: "https://api.deepseek.com"
  wire_api: "chat_completions"
  api_key_env: "DEEPSEEK_API_KEY"   # never hard-code the key in this file
  api_key: ""
  primary_model: "deepseek-v4-flash"   # writer (fast/cheap): stages 16-22
  fallback_models: []
  # Reviewer isolation (release_check v2): Stage 15 Socratic critic runs on a
  # DIFFERENT model than the writer. v4-pro's stronger reasoning suits
  # critique/decision/audit. Passes the reviewer_isolation gate.
  critic_model: "deepseek-v4-pro"
  critic_source: "model"
  timeout_sec: 900
  max_retries: 4
  retry_base_delay: 3.0
  # Legacy names deepseek-chat / deepseek-reasoner deprecate 2026-07-24.

experiment:
  mode: sandbox                      # subprocess (no Docker in most setups)
  time_budget_sec: 300
  metric_key: detection_f1
  metric_direction: maximize
  allow_legacy_experiment_path: false
  code_agent:
    exec_fix_timeout_sec: 180
    tree_search_eval_timeout_sec: 180
    long_call_max_tokens: 8192
  opencode:
    enabled: false
    workspace_cleanup: false
    fallback_to_code_agent: false
  sandbox:
    python_path: ".venv/bin/python"
    env_policy: allowlist

runtime:
  timezone: "Asia/Shanghai"
  skip_stages: []

knowledge_base:
  root: "./kb-hwsec"

notifications:
  channel: "none"
  on_stage_start: false
  on_gate_required: false
