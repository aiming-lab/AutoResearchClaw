project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

# ============================================================================
# LLM Provider Configuration
# ============================================================================
# Supported providers:
#   - "openai"           → OpenAI API (default base_url)
#   - "openrouter"       → OpenRouter (access to 200+ models via single API)
#   - "deepseek"         → DeepSeek API
#   - "openai-compatible" → Any OpenAI-compatible API (requires base_url)
#   - "acp"              → ACP agent protocol (for local agents)
#
# OpenRouter Example (https://openrouter.ai):
#   Get your API key at https://openrouter.ai/keys
#   Models: anthropic/claude-3.5-sonnet, google/gemini-pro-1.5, meta-llama/llama-3.1-70b-instruct
#   See all models: https://openrouter.ai/models
# ============================================================================
llm:
  # Provider options: "openai", "openrouter", "deepseek", "openai-compatible", "acp"
  provider: "openai"
  
  # base_url is auto-set for known providers (openai, openrouter, deepseek)
  # Only needed for "openai-compatible" provider
  base_url: "https://api.openai.com/v1"
  
  # API key from environment variable (recommended) or direct value
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  
  primary_model: "gpt-4o"
  fallback_models:
    - "gpt-4.1"
    - "gpt-4o-mini"
  
  # Semantic Scholar API key (optional, for literature search)
  s2_api_key: ""
  notes: ""

# ============================================================================
# Example: OpenRouter Configuration
# ============================================================================
# llm:
#   provider: "openrouter"
#   api_key_env: "OPENROUTER_API_KEY"
#   primary_model: "anthropic/claude-3.5-sonnet"
#   fallback_models:
#     - "google/gemini-pro-1.5"
#     - "meta-llama/llama-3.1-70b-instruct"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "none"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false

  # Scientific Visualization Agent (Code-to-Viz + Nano Banana)
  # Uses a Decision Agent to analyze paper content and determine:
  #   - Code figures (bar charts, line plots) → Matplotlib/TikZ
  #   - Image figures (architecture, flowcharts) → Gemini Nano Banana
  figure_agent:
    enabled: true
    min_figures: 3
    max_figures: 10
    max_iterations: 3
    render_timeout_sec: 30
    # Security: Docker sandbox for visualization code execution
    # use_docker: null  # null = auto-detect, true = force, false = disable
    docker_image: "researchclaw/experiment:latest"
    # Output format: "python" (Matplotlib/Seaborn) or "latex" (TikZ/PGFPlots)
    output_format: "python"
    # Nano Banana (Gemini native image generation)
    nano_banana_enabled: true
    # gemini_api_key: ""  # or set GEMINI_API_KEY env var
    gemini_model: "gemini-2.5-flash-image"
    strict_mode: false
    dpi: 300

prompts:
  custom_file: ""
